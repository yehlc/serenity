<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>祥和年菜預購</title>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <style>
        /* 樣式保持不變 */
        body { font-family: 'Helvetica Neue', Helvetica, Arial, '微軟正黑體', sans-serif; margin: 0; padding: 0; background-color: #f5f5f5; padding-bottom: 80px; }
        .header { background-color: #8b0000; color: white; text-align: center; padding: 15px; font-size: 1.2em; font-weight: bold; position: sticky; top: 0; z-index: 10; }
        .menu-container { padding: 10px; }
        .menu-item { background: white; border-radius: 10px; padding: 15px; margin-bottom: 12px; display: flex; align-items: center; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .menu-item.sold-out { opacity: 0.5; filter: grayscale(100%); } 
        .sold-out-badge { color: #d32f2f; font-weight: bold; font-size: 0.9em; border: 1px solid #d32f2f; padding: 2px 5px; border-radius: 3px; display: inline-block; margin-top: 5px; }
        .menu-item img { width: 80px; height: 80px; border-radius: 8px; object-fit: cover; margin-right: 15px; background-color: #eee; }
        .menu-item-info { flex-grow: 1; }
        .menu-item-title { font-size: 1.1em; font-weight: bold; color: #333; margin-bottom: 5px; }
        .menu-item-price { color: #e91e63; font-weight: bold; font-size: 1.1em; }
        .qty-controls { display: flex; align-items: center; }
        .qty-btn { width: 30px; height: 30px; border: 1px solid #ccc; background: white; border-radius: 5px; font-size: 1.2em; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        .qty-input { width: 40px; text-align: center; border: none; font-size: 1.1em; font-weight: bold; margin: 0 5px; background: transparent; }
        
        .cart-bar { position: fixed; bottom: 0; left: 0; width: 100%; background-color: #333; color: white; display: flex; justify-content: space-between; align-items: center; padding: 15px 20px; box-sizing: border-box; cursor: pointer; z-index: 20; transition: transform 0.3s ease; }
        .cart-bar.disabled { background-color: #999; cursor: not-allowed; }
        .cart-total-text { font-size: 1.2em; font-weight: bold; }
        .cart-btn-text { background-color: #e91e63; padding: 8px 15px; border-radius: 20px; font-weight: bold; }

        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); z-index: 30; justify-content: center; align-items: flex-end; }
        .modal-content { background: white; width: 100%; max-height: 85vh; border-radius: 20px 20px 0 0; padding: 25px 20px; box-sizing: border-box; overflow-y: auto; animation: slideUp 0.3s ease-out; }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
        .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; border-bottom: 1px solid #eee; padding-bottom: 10px; }
        .modal-header h3 { margin: 0; font-size: 1.3em; }
        .close-btn { font-size: 1.5em; color: #999; cursor: pointer; border: none; background: none; }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; font-weight: bold; margin-bottom: 5px; color: #555; }
        .form-group input, .form-group select { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; font-size: 1em; }
        .submit-btn { width: 100%; padding: 15px; background-color: #8b0000; color: white; border: none; border-radius: 8px; font-size: 1.2em; font-weight: bold; margin-top: 10px; cursor: pointer; }
        
        #loading { text-align: center; padding: 30px; color: #666; font-weight: bold; }
    </style>
</head>
<body>

    <div class="header">祥和蔬食料理 - 年菜預購</div>
    
    <div id="loading">載入最新菜單與庫存中...</div>
    <div class="menu-container" id="menuList" style="display:none;"></div>

    <div class="cart-bar disabled" id="cartBar" onclick="openCart()">
        <span class="cart-total-text" id="cartTotal">合計: NT$ 0</span>
        <span class="cart-btn-text">填寫訂單 ➔</span>
    </div>

    <div class="modal-overlay" id="orderModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>填寫訂購資訊</h3>
                <button class="close-btn" onclick="closeCart()">×</button>
            </div>
            
            <div class="form-group"><label>取貨分店</label><select id="branch"><option value="鎮江店">鎮江店</option><option value="慶城店">慶城店</option></select></div>
            <div class="form-group"><label>取貨日期</label><input type="date" id="pickupDate" required></div>
            <div class="form-group"><label>取貨時間</label>
                <select id="pickupTime"><option value="11:30">11:30</option><option value="12:00">12:00</option><option value="12:30">12:30</option><option value="17:30">17:30</option><option value="18:00">18:00</option></select>
            </div>
            <div class="form-group"><label>訂購人姓名</label><input type="text" id="custName" placeholder="請填寫真實姓名" required></div>
            <div class="form-group"><label>連絡電話</label><input type="tel" id="custPhone" placeholder="例如: 0912345678" required></div>

            <button class="submit-btn" id="submitBtn" onclick="submitOrder()">確認送出訂單</button>
        </div>
    </div>
    
    <div id="choiceModal" class="modal-overlay" style="align-items:center;">
        <div class="modal-content" style="border-radius:15px; margin:20px; text-align:center;">
            <h3>您有一筆未完成的訂單</h3>
            <p style="margin-bottom: 20px;">請問您想要？</p>
            <button class="submit-btn" onclick="startEdit(true)">修改原訂單</button>
            <button class="submit-btn" style="background:#666; margin-top: 15px;" onclick="startEdit(false)">再開一筆新訂單</button>
        </div>
    </div>

    <script>
        const GAS_URL = 'https://script.google.com/macros/s/AKfycbwWPu_pZsN9EoFVYJmyUhndaj6IfO2ekHi1jnB7lJMO2I0MDemfZSNWlDkiQUIyUK8u/exec';

        const menuItems = [
            { name: "祥和拼盤", price: 800 }, { name: "佛跳牆", price: 1380 }, { name: "肉骨茶鍋", price: 1380 },
            { name: "酸白菜鍋", price: 860 }, { name: "麻油鍋", price: 860 }, { name: "紅燒獅子頭", price: 640 },
            { name: "清蒸臭豆腐", price: 640 }, { name: "麻辣臭豆腐", price: 600 }, { name: "三杯猴頭菇", price: 760 },
            { name: "宮保素雞丁", price: 600 }, { name: "糖醋素肉", price: 600 }, { name: "素杏鮑牛腩煲", price: 720 },
            { name: "酸白菜素牛肉", price: 560 }, { name: "麻油素腰花", price: 760 }, { name: "蓉城口水雞", price: 760 },
            { name: "祥和素油雞", price: 640 }, { name: "松露油飯", price: 380 }, { name: "椒麻油飯", price: 300 },
            { name: "炒炊粉", price: 180 }, { name: "原味蘿蔔糕", price: 200 }, { name: "酥香蘿蔔糕", price: 280 }
        ];

        let currentTotal = 0;
        let quantities = new Array(menuItems.length).fill(0);
        let inventoryData = {};
        let lastOrderData = null; 
        let currentAction = "new"; 

        window.onload = function() {
            liff.init({ liffId: "2009843210-1DLZ73WP" }).then(() => {
                if (!liff.isLoggedIn()) {
                    liff.login();
                } else {
                    checkHistoryAndLoad();
                }
            }).catch(err => console.error("LIFF Error:", err));
        };

        function checkHistoryAndLoad() {
            const profile = liff.getDecodedIDToken();
            const userId = profile.sub; 

            fetch(`${GAS_URL}?userId=${userId}`)
                .then(res => res.json())
                .then(res => {
                    inventoryData = res.inventory;
                    
                    if (res.lastOrder) {
                        lastOrderData = res.lastOrder;
                        
                        // 【時效性防呆】計算取貨日是否小於等於 3 天
                        let pickupDate = new Date(lastOrderData.date);
                        let today = new Date();
                        let diffDays = Math.ceil((pickupDate - today) / (1000 * 60 * 60 * 24));
                        
                        if (diffDays <= 3) {
                            alert("您有一筆近期的訂單（3天內取貨），已進入準備階段無法線上修改。如需更改請致電門市。您仍可繼續建立一筆新訂單。");
                            startEdit(false); // 強制進入新訂單模式
                        } else {
                            // 顯示修改選擇彈窗
                            document.getElementById('choiceModal').style.display = 'flex';
                        }
                    } else {
                        startEdit(false);
                    }
                });
        }

        // 選擇修改或新增後的流程
        function startEdit(isEdit) {
            document.getElementById('choiceModal').style.display = 'none';
            if (isEdit) {
                applyHistoryToMenu();
            } else {
                currentAction = "new";
            }
            document.getElementById('loading').style.display = 'none';
            document.getElementById('menuList').style.display = 'block';
            renderMenu(); // 根據 quantities 渲染畫面
            calculateTotal();
        }

        function applyHistoryToMenu() {
            currentAction = "update";
            
            // 組合出 21 項陣列並過濾掉 X 欄 (index 16)
            let historyQty = lastOrderData.items; 
            let part1 = historyQty.slice(0, 16);
            let part2 = historyQty.slice(17, 22); 
            quantities = part1.concat(part2).map(v => parseInt(v) || 0);
            
            document.getElementById('custName').value = lastOrderData.name;
            document.getElementById('custPhone').value = lastOrderData.phone;
            document.getElementById('pickupDate').value = lastOrderData.date;
        }

        function renderMenu() {
            const container = document.getElementById('menuList');
            container.innerHTML = '';
            
            menuItems.forEach((item, index) => {
                let stock = inventoryData[item.name] !== undefined ? parseInt(inventoryData[item.name]) : 999;
                let isSoldOut = stock <= 0;
                let currentQty = quantities[index] || 0; // 讀取目前數值 (讓歷史訂單能顯示出來)

                const div = document.createElement('div');
                div.className = 'menu-item' + (isSoldOut ? ' sold-out' : '');
                
                let controlsHtml = isSoldOut 
                    ? `<div class="sold-out-badge">已售完</div>` 
                    : `<div class="qty-controls">
                        <button class="qty-btn" onclick="updateQty(${index}, -1)">-</button>
                        <input type="number" class="qty-input" id="qty-${index}" value="${currentQty}" readonly>
                        <button class="qty-btn" onclick="updateQty(${index}, 1)">+</button>
                       </div>`;

                div.innerHTML = `
                    <img src="https://via.placeholder.com/80?text=圖片" alt="${item.name}">
                    <div class="menu-item-info">
                        <div class="menu-item-title">${item.name}</div>
                        <div class="menu-item-price">NT$ ${item.price}</div>
                    </div>
                    ${controlsHtml}
                `;
                container.appendChild(div);
            });
        }

        function updateQty(index, change) {
            let newQty = quantities[index] + change;
            if (newQty < 0) newQty = 0; 
            quantities[index] = newQty;
            document.getElementById(`qty-${index}`).value = newQty;
            calculateTotal();
        }

        function calculateTotal() {
            currentTotal = menuItems.reduce((sum, item, index) => sum + (item.price * quantities[index]), 0);
            const cartBar = document.getElementById('cartBar');
            document.getElementById('cartTotal').innerText = `合計: NT$ ${currentTotal}`;
            if (currentTotal > 0) { cartBar.classList.remove('disabled'); } 
            else { cartBar.classList.add('disabled'); }
        }

        function openCart() {
            if (currentTotal > 0) { document.getElementById('orderModal').style.display = 'flex'; } 
            else { alert("購物車是空的，請先選擇餐點唷！"); }
        }

        function closeCart() { document.getElementById('orderModal').style.display = 'none'; }

        function submitOrder() {
            const custName = document.getElementById('custName').value.trim();
            const custPhone = document.getElementById('custPhone').value.trim();
            const date = document.getElementById('pickupDate').value;
            
            if (!custName || !custPhone || !date) { alert("請填寫完整的姓名、電話與取貨日期！"); return; }

            document.getElementById('submitBtn').innerText = "訂單傳送中...";
            document.getElementById('submitBtn').disabled = true;

            liff.getProfile().then(profile => {
                const orderData = {
                    userId: profile.userId,
                    action: currentAction, // "new" 或 "update"
                    orderId: currentAction === "update" ? lastOrderData.orderId : null,
                    name: custName,
                    phone: custPhone,
                    branch: document.getElementById('branch').value,
                    date: date,
                    time: document.getElementById('pickupTime').value,
                    totalAmount: currentTotal,
                    items_qty_array: quantities 
                };

                fetch(GAS_URL, {
                    method: 'POST', mode: 'no-cors',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(orderData)
                }).then(() => {
                    alert(currentAction === "update" ? '訂單已成功修改！請留意官方帳號訊息。' : '訂單已成功送出！請留意官方帳號訊息。');
                    liff.closeWindow();
                }).catch(err => {
                    alert('送出失敗，請稍後再試。');
                    document.getElementById('submitBtn').innerText = "確認送出訂單";
                    document.getElementById('submitBtn').disabled = false;
                });
            }).catch(err => alert("無法取得 LINE 授權。"));
        }
    </script>
</body>
</html>
